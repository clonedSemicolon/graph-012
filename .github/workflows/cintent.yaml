name: Custom

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
      
      - name: Install dependencies
        run: |
          pip install . && pip install -r requirements_dev.txt && pip install pytest
      
      # CINTENT >> INSERT_CINTENT
      - uses: clonedSemicolon/cintent_v3@v1
        with:
          nonblocking: true
          
      - name: Test with pytest
        run: |
          python -m pytest --import-mode=importlib "tests/"

      # CINTENT >> INSERT_CINTENT
      - name: Upload CIntent Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.CINTENT_ARTIFACT_NAME }}
          path: ${{ env.CINTENT_LOGS }}
