name: Dynapyt

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
      
      - uses: JavidDitty/setup-dynapyt@main
        with:
          dynapyt-version: "0.1.0"
          instrument-directory: "tests/"

      - name: Install dependencies
        run: |
          pip install . && pip install -r requirements_dev.txt && pip install pytest

      - name: Test with pytest
        run: |
          python -m dynapyt.run_analysis --entry run_all_tests.py --analysis TraceAll --output_dir $DYNAPYT_OUTPUT

      - name: Upload Dynapyt Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.DYNAPYT_ARTIFACT_NAME }}
          path: ${{ env.DYNAPYT_OUTPUT }}
