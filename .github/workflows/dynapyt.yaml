name: Dynapyt

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"
      
      # - uses: JavidDitty/setup-dynapyt@main
      #   with:
      #     dynapyt-version: "0.2.1"
      #     instrument-directory: "tests/"

      - name: Install dependencies
        run: |
          pip install -U -r requirements_dev.txt
          pip install -U -r requirements_backend.txt
          pip install -U -e .[cssselect,pyquery]
  
      - name: Start MongoDB
        uses: ankane/setup-mongodb@v1
        #uses: supercharge/mongodb-github-action@1.8.0 # does not work on macos
        #with:
        #  mongodb-version: 5.0

      - name: Start Redis
        if: runner.os == 'Linux'
        uses: supercharge/redis-github-action@1.4.0
        with:
          redis-version: 5
  
      # - name: Install dependencies
      #   run: |
      #     python -m pip install . && python -m pip install -r requirements_dev.txt && python -m pip install pytest

      - name: Test with pytest
        run: |
          python -m pip install pytest pytest-xdist libcst dynapyt==0.1.0
          python -m dynapyt.run_instrumentation --directory tests/ --analysis TraceAll
          python -m dynapyt.run_analysis --entry run_all_tests.py --analysis TraceAll

      - name: Upload Dynapyt Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.DYNAPYT_ARTIFACT_NAME }}
          path: output.log
